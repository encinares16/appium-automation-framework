name: Android Emulator Tests

on:
  push:
    branches:
      - ci/android-test-workflow

env:
  DOTENV_CONFIG_QUIET: true
  STANDARD_USER: ${{ secrets.STANDARD_USER }}
  STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
  LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
  LOCKED_OUT_PASSWORD: ${{ secrets.LOCKED_OUT_PASSWORD }}

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: TypeScript type check
        run: npx tsc --project tsconfig.json --noEmit

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android Emulator and Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
          script: |
            adb wait-for-device
            adb devices
            adb shell getprop ro.build.version.release

            echo "Installing APK..."
            adb install -r ./app/app.apk

            echo "Running WDIO tests..."
            npm run wdio

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: false
