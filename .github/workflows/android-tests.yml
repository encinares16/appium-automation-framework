name: Android Emulator Tests

on:
  push:
    branches:
      - ci/android-test-workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTENV_CONFIG_QUIET: true

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci
        env:
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          STANDARD_PASSWORD: ${{ secrets.STANDARD_PASSWORD }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          LOCKED_OUT_PASSWORD: ${{ secrets.LOCKED_OUT_PASSWORD }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules

          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -no-snapshot
            -noaudio
            -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device

            echo "Device List"
            adb devices

            echo "Android Version"
            adb shell getprop ro.build.version.release

            echo "Install My Demo App application"
            adb install ./app/app.apk

            echo "Running Typecheck"
            npx tsc --project tsconfig.json --noEmit
                        
            echo "Run WebdriverIO + Appium tests"
            npm run wdio
