name: Appium WDIO Test

on:
  push:
    branches:
      - ci/android-test-workflow
  pull_request:
    branches:
      - ci/android-test-workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTENV_CONFIG_QUIET: true

jobs:
  mobile-test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
            -no-metrics
            -accel off
          script: |
            echo "Restarting ADB..."
            adb kill-server
            adb start-server

            echo "Waiting for emulator..."
            adb wait-for-device

            BOOT=""
            until [[ "$BOOT" == "1" ]]; do
              BOOT=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
              echo "Waiting for Android boot..."
              sleep 10
            done

            adb devices
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0

            echo "Android emulator is ready."

      - name: Install APK
        run: |
          adb install ./apk/app.apk

      - name: Verify APK installed
        run: |
          adb shell pm list packages | grep -i app || true

      - name: Start Appium server
        run: |
          nohup npx appium \
          --log appium.log \
          > appium-server.log 2>&1 &

          sleep 10

      - name: Run WDIO Appium Test
        run: |
          npm run wdio

      - name: Generate Allure Report
        if: always()
        run: |
          npm run allure:generate

      - name: Archive Test Report
        if: always()
        run: |
          mkdir -p test-results

          cp -r allure-report test-results/ || true
          cp -r allure-results test-results/ || true

          cp appium.log test-results/ || true
          cp appium-server.log test-results/ || true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-report
          path: test-results

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-screenshots
          path: |
            ./screenshots/**
            ./test/**/screenshots/**
          if-no-files-found: ignore
